name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    name: Build and release Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: windows-tauri-release
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Calculate version-specific build number
        id: build-number
        shell: pwsh
        run: |
          # Read current version from tauri.conf.json
          $config = Get-Content "src-tauri\tauri.conf.json" -Raw | ConvertFrom-Json
          $version = $config.version
          Write-Host "Current version: $version"

          # Get all tags for this version
          git fetch --tags
          $tags = git tag -l "super-clipboard-v${version}-*" | Sort-Object

          if ($tags) {
            # Extract build numbers and find the highest
            $buildNumbers = $tags | ForEach-Object {
              if ($_ -match "super-clipboard-v${version}-(\d+)") {
                [int]$matches[1]
              }
            }
            $maxBuild = ($buildNumbers | Measure-Object -Maximum).Maximum
            $nextBuild = $maxBuild + 1
          } else {
            # First build for this version
            $nextBuild = 1
          }

          Write-Host "Next build number: $nextBuild"
          "build_number=$nextBuild" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          # Update version in tauri.conf.json to include build number
          $fullVersion = "${version}+build.${nextBuild}"
          $config.version = $fullVersion
          $config | ConvertTo-Json -Depth 100 | Set-Content "src-tauri\tauri.conf.json" -Encoding utf8
          Write-Host "Updated tauri.conf.json version to: $fullVersion"

      - name: Run frontend checks
        run: npm run ci:frontend

      - name: Check updater signing secrets
        id: signing-secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            "available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Warning "TAURI_SIGNING_PRIVATE_KEY is not configured. Skipping the signed Tauri release build."
          } else {
            "available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is configured. Signed release build will proceed."
          }

      - name: Build and upload Tauri release
        if: steps.signing-secrets.outputs.available == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: super-clipboard-v__VERSION__-${{ steps.build-number.outputs.build_number }}
          releaseName: super-clipboard v__VERSION__ build ${{ steps.build-number.outputs.build_number }}
          releaseBody: |
            自动发版：本预发布版由 GitHub Actions 在 main 分支提交后生成。

            **版本**: v${{ steps.build-number.outputs.version }} build ${{ steps.build-number.outputs.build_number }}

            验证内容：
            - npm test
            - npm run typecheck
            - Tauri Windows release build

            注意：当前项目仍处于早期版本，真实剪贴板监听、托盘、全局快捷键和大内容捕获需要在 Windows 实机继续验证。
          releaseDraft: false
          prerelease: false

      - name: Disable updater artifacts without signing secrets
        if: steps.signing-secrets.outputs.available != 'true'
        shell: pwsh
        run: |
          Write-Warning "TAURI_SIGNING_PRIVATE_KEY is not configured. Building the NSIS installer without updater artifacts."
          $configPath = "src-tauri\tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.bundle.createUpdaterArtifacts = $false
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath -Encoding utf8

      - name: Build and upload Tauri installer
        if: steps.signing-secrets.outputs.available != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: super-clipboard-v__VERSION__-${{ steps.build-number.outputs.build_number }}
          releaseName: super-clipboard v__VERSION__ build ${{ steps.build-number.outputs.build_number }}
          releaseBody: |
            自动发版：本版本由 GitHub Actions 在 main 分支提交后生成。

            **版本**: v${{ steps.build-number.outputs.version }} build ${{ steps.build-number.outputs.build_number }}

            验证内容：
            - npm test
            - npm run typecheck
            - Tauri Windows release build

            注意：仓库未配置 TAURI_SIGNING_PRIVATE_KEY，本次 Release 只上传 Windows 安装包，不生成 updater artifacts。配置 updater signing Secret 后，后续 Release 会恢复自动更新产物。
          releaseDraft: false
          prerelease: false
