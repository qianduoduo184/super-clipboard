name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    name: Build and release Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: windows-tauri-release
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run ci:frontend

      - name: Check updater signing secrets
        id: signing-secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            "available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Warning "TAURI_SIGNING_PRIVATE_KEY is not configured. Skipping the signed Tauri release build."
          } else {
            "available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Validate updater signing secrets
        if: steps.signing-secrets.outputs.available == 'true'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is empty. Paste the full content of the updater private key file, not the public key or a file path."
          }

          $privateKey = $env:TAURI_SIGNING_PRIVATE_KEY.Trim()

          try {
            $decodedKey = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($privateKey))
          } catch {
            throw "TAURI_SIGNING_PRIVATE_KEY must be the base64 content generated by 'npx tauri signer generate'."
          }

          if (-not $decodedKey.StartsWith("untrusted comment:") -or $decodedKey -notmatch "secret key") {
            throw "TAURI_SIGNING_PRIVATE_KEY is not an updater private key. Use the .key file content, not the .key.pub content."
          }

          New-Item -ItemType Directory -Force .tmp | Out-Null
          "updater signing preflight" | Set-Content -Path .tmp\updater-signing-preflight.txt -Encoding utf8

          $env:TAURI_PRIVATE_KEY = $privateKey
          # Set password to empty string if not provided (rsign accepts empty password via env var)
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            $env:TAURI_PRIVATE_KEY_PASSWORD = ""
          }

          # The signer will read from TAURI_PRIVATE_KEY and TAURI_PRIVATE_KEY_PASSWORD env vars automatically
          npx tauri signer sign .tmp\updater-signing-preflight.txt

      - name: Build and upload Tauri release
        if: steps.signing-secrets.outputs.available == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: super-clipboard-v__VERSION__-${{ github.run_number }}
          releaseName: super-clipboard v__VERSION__ build ${{ github.run_number }}
          releaseBody: |
            自动发版：本预发布版由 GitHub Actions 在 main 分支提交后生成。

            验证内容：
            - npm test
            - npm run typecheck
            - Tauri Windows release build

            注意：当前项目仍处于早期版本，真实剪贴板监听、托盘、全局快捷键和大内容捕获需要在 Windows 实机继续验证。
          releaseDraft: false
          prerelease: false

      - name: Disable updater artifacts without signing secrets
        if: steps.signing-secrets.outputs.available != 'true'
        shell: pwsh
        run: |
          Write-Warning "TAURI_SIGNING_PRIVATE_KEY is not configured. Building the NSIS installer without updater artifacts."
          $configPath = "src-tauri\tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.bundle.createUpdaterArtifacts = $false
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath -Encoding utf8

      - name: Build and upload Tauri installer
        if: steps.signing-secrets.outputs.available != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: super-clipboard-v__VERSION__-${{ github.run_number }}
          releaseName: super-clipboard v__VERSION__ build ${{ github.run_number }}
          releaseBody: |
            自动发版：本版本由 GitHub Actions 在 main 分支提交后生成。

            验证内容：
            - npm test
            - npm run typecheck
            - Tauri Windows release build

            注意：仓库未配置 TAURI_SIGNING_PRIVATE_KEY，本次 Release 只上传 Windows 安装包，不生成 updater artifacts。配置 updater signing Secret 后，后续 Release 会恢复自动更新产物。
          releaseDraft: false
          prerelease: false
